#Versione di docker compose
version: '3.8'

services:
  #GESTIONE BACKEND
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: esonero_backend
    ports:
      - "8003:8003"
    deploy:
      resources:
        limits:
          memory: 2G
  #GESTIONE FRONTEND
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: esonero_frontend
    ports:
      - "8004:8004"
    environment:
      - BACKEND_URL=http://backend:8003
    depends_on:
      - backend